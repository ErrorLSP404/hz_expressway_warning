# 配置端口
server:
  port: 8765
  ssl:
    # 本地放置证书后开启；证书勿提交到仓库
    enabled: false
    key-store: classpath:huizhu.net.pfx
    key-store-password: ${SSL_KEYSTORE_PASSWORD:change-me}
    keyStoreType: PKCS12
spring:
  # 环境 dev:开发环境|test:测试环境|prod:生产环境|zjhw:镇江公路局
  profiles:
    active: dev
  application:
    name: expressway_warning #服务名称
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB

# JWT配置
jwt:
  # 密匙KEY（生产环境请替换为强随机串，或使用环境变量 JWT_SECRET）
  secret: ${JWT_SECRET:change-me-jwt-secret}
  # HeaderKEY
  tokenHeader: Authorization
  # Token前缀字符
  tokenPrefix: Hz-
  # 过期时间 单位秒 1天后过期=86400 7天后过期=604800
  expiration: 604800
  # 配置不需要认证的接口
  antMatchers: /login/**,


# Mybatis-plus相关配置
mybatis-plus:
  type-aliases-package: net.huizhu.core.entity
  # xml扫描，多个目录用逗号或者分号分隔（告诉 Mapper 所对应的 XML 文件位置）
  mapper-locations: classpath:mybatis/mapper/*.xml
  # 以下配置均有默认值,可以不设置
  global-config:
    db-config:
      #主键类型 AUTO:"数据库ID自增" INPUT:"用户输入ID",ID_WORKER:"全局唯一ID (数字类型唯一ID)", UUID:"全局唯一ID UUID";
      id-type: AUTO
      #字段策略 IGNORED:"忽略判断"  NOT_NULL:"非 NULL 判断")  NOT_EMPTY:"非空判断"
      field-strategy: NOT_EMPTY
      #数据库类型
      db-type: MYSQL
  configuration:
    # 是否开启自动驼峰命名规则映射:从数据库列名到Java属性驼峰命名的类似映射
    map-underscore-to-camel-case: true
    # 返回map时true:当查询数据为空时字段返回为null,false:不加这个查询数据为空时，字段将被隐藏
    call-setters-on-nulls: true
    # 这个配置会将执行的sql打印出来，在开发或测试的时候可以用
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl



upload:
  fileUrl: ${UPLOAD_FILE_URL:http://127.0.0.1:8089/upload/}
